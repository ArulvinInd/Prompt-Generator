<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#4f46e5"/>
  <!-- Wand body: diagonal rounded rectangle, rotated -45° around center -->
  <rect x="116" y="236" width="260" height="40" rx="20" fill="white" transform="rotate(-45 256 256)"/>
  <!-- Wand tip cap (rounded end highlight) -->
  <circle cx="341" cy="171" r="22" fill="#c7d2fe"/>
  <!-- Star at wand tip -->
  <polygon points="370,90 382.9,124.2 419.5,125.9 390.9,148.8 400.6,184.1 370,164 339.4,184.1 349.1,148.8 320.5,125.9 357.1,124.2" fill="white"/>
  <!-- Sparkle cross top-left area -->
  <line x1="150" y1="148" x2="150" y2="178" stroke="white" stroke-width="10" stroke-linecap="round"/>
  <line x1="135" y1="163" x2="165" y2="163" stroke="white" stroke-width="10" stroke-linecap="round"/>
  <!-- Small sparkle dot -->
  <circle cx="195" cy="120" r="9" fill="white" opacity="0.85"/>
  <!-- Sparkle cross bottom-right area -->
  <line x1="390" y1="320" x2="390" y2="344" stroke="white" stroke-width="8" stroke-linecap="round" opacity="0.75"/>
  <line x1="378" y1="332" x2="402" y2="332" stroke="white" stroke-width="8" stroke-linecap="round" opacity="0.75"/>
  <!-- Small sparkle dot -->
  <circle cx="420" cy="290" r="7" fill="white" opacity="0.7"/>
</svg>
